name: Website

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [remote-trigger]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "./site"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: ${{ env.BUILD_PATH }}/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # --- Clang toolchain for the Woboq /source/ browser + clang symbol index ---
      # generate.py is best-effort: if any of this is missing it skips the source
      # browser and falls back to GitHub blob links, so the site still deploys.
      - name: Install clang toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            llvm-18-dev libclang-18-dev libclang-cpp18-dev \
            libclang-common-18-dev clang-18

      # Woboq's codebrowser has no release binaries, so we build it from a pinned
      # commit against the LLVM 18 that ships on the runner. The built binaries +
      # data assets are cached under .tools/woboq/, where generate.py auto-discovers
      # them; bump WOBOQ_REV in the key to rebuild.
      #
      # WOBOQ_REV is pinned to the last commit that builds on LLVM 18: codebrowser
      # master ("Support Clang 22") uses LLVM 22-only APIs (getTagType/StringSwitch)
      # that don't exist in 18. 02e30f8 ("Fix build for Clang 21") is the parent —
      # its only newer-Clang code is CLANG_VERSION_MAJOR>=21 guarded, so 18 builds.
      - name: Cache Woboq codebrowser
        id: woboq-cache
        uses: actions/cache@v4
        with:
          path: .tools/woboq
          key: woboq-${{ runner.os }}-llvm18-02e30f8

      - name: Build Woboq codebrowser
        if: steps.woboq-cache.outputs.cache-hit != 'true'
        run: |
          set -eux
          WOBOQ_REV=02e30f8f05c347b5d3831d45da7efbc3059f3c74
          git clone https://github.com/KDAB/codebrowser.git /tmp/codebrowser
          cd /tmp/codebrowser
          git checkout "$WOBOQ_REV"
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-18/lib/cmake/clang
          cmake --build build
          mkdir -p "$GITHUB_WORKSPACE/.tools/woboq"
          cp "$(find build -name codebrowser_generator -type f | head -1)" \
             "$GITHUB_WORKSPACE/.tools/woboq/"
          cp "$(find build -name codebrowser_indexgenerator -type f | head -1)" \
             "$GITHUB_WORKSPACE/.tools/woboq/"
          cp -r data "$GITHUB_WORKSPACE/.tools/woboq/data"

      - name: Generate
        env:
          CHARMOS_LIBCLANG: /usr/lib/llvm-18/lib/libclang.so.1
        run: |
          pip install -r requirements.txt --break-system-packages
          npm --prefix site i starlight-theme-obsidian
          python3 generate.py

      - name: Install, build, and upload your site
        uses: withastro/action@v5
        with:
          path: ./site



  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

